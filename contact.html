}

 }

        h1 {

button{

}

#msg{

button:hover {

    <h1>CONTACTEZ Biam HOUSE</h1>
<div class="champ"> 
    <form method="POST"> 
        <label>NOM COMPLET</label>
        <div class="ligne">
        <input type="nom" id="nom" placeholder="Votre nom"> 
        
    </div>

    <div class="champ">
        <label class="lab">ADRESSE EMAIL</label> 
        <input type="email" id="email" placeholder="Votre email">

    </div>

    <div class="champ">
        <label class="lab">NUMERO TELEPHONE</label>
        <input type="tel" id="telephone" placeholder="Téléphone"> 

    </div>

    <div class="champ"></div>
       <label>TYPE</label>
        <select id="type"> 
            <option value="">Type de demande</option> 
            <option>Louer un bien</option>  
            <option>Visite</option> 

        </div>
        </select> 
        <label>MESSAGE</label>
        <textarea id="message" placeholder="Votre message"></textarea> <br> 

          <button type="submit" class="btn">Envoyer</button> 
 
        <p id="msg"></p> 

        <div class="login">
            
    </form> 
 
</section>
